<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .card { border-radius: 1rem; }
    .short-url { color: #0d6efd; font-weight: bold; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">🔗 URL Shortener</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="index.html">Головна</a></li>
        <li class="nav-item"><a class="nav-link" href="details.html">Деталі</a></li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
        <li class="nav-item"><a class="nav-link btn btn-primary btn-sm text-white px-3" href="register.html">Реєстрація</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">
  <div class="card p-4 mb-4 shadow-sm">
    <h4>Додати URL</h4>
    <form id="addUrlForm">
      <div class="mb-3">
        <label class="form-label">Оригінальне посилання</label>
        <input id="long-url" type="url" class="form-control" placeholder="https://example.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Короткий домен</label>
        <input id="short-domain" type="text" class="form-control" value="https://short.ly/" readonly>
      </div>
      <button type="submit" class="btn btn-primary">Скоротити</button>
    </form>
  </div>

  <div class="card p-4 shadow-sm">
    <h4>Список URL</h4>
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>#</th>
            <th>Оригінальний</th>
            <th>Короткий</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody id="url-list">
          </tbody>
      </table>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 URL Shortener App
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="model.js"></script>
<script src="controller.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof Controller !== 'undefined') {
      // 1. Завантажуємо список посилань
      Controller.loadUrls();

      // 2. Обробляємо додавання нового посилання
      const addForm = document.getElementById('addUrlForm');
      if (addForm) {
        addForm.addEventListener('submit', (e) => {
          e.preventDefault();
          Controller.addUrl(); 
        });
      }
    } else {
      console.error("Controller.js не знайдено!");
    }
  });
</script>

</body>
</html>
