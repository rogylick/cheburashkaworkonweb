<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f8f9fa; }
    .card { border-radius: 1rem; }
    .short-url { color: #0d6efd; font-weight: bold; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">URL Shortener</a>
  </div>
</nav>

<div class="container my-5">

  <!-- Add URL Form -->
  <div class="card p-4 mb-4 shadow-sm">
    <h4>Додати URL</h4>
    <form>
      <div class="mb-3">
        <label class="form-label">Оригінальне посилання</label>
        <input type="url" class="form-control" placeholder="https://example.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Короткий домен</label>
        <input type="text" class="form-control" value="https://short.ly/">
      </div>
      <button class="btn btn-primary">Скоротити</button>
    </form>
  </div>

  <!-- URL List -->
  <div class="card p-4 shadow-sm">
    <h4>Список URL</h4>

    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Оригінальний URL</th>
            <th>Короткий URL</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td class="text-truncate" style="max-width: 200px;">https://docs.google.com/document/d/example</td>
            <td class="short-url">https://short.ly/abc123</td>
            <td>
              <button class="btn btn-sm btn-warning">Редагувати</button>
              <button class="btn btn-sm btn-danger">Видалити</button>
            </td>
          </tr>

          <tr>
            <td>2</td>
            <td class="text-truncate" style="max-width: 200px;">https://example.com/very/long/link</td>
            <td class="short-url">https://short.ly/xyz789</td>
            <td>
                <a href="edit.html" class="btn btn-warning btn-sm">Редагувати</a>
                <a href="details.html" class="btn btn-info btn-sm">Переглянути</a>
                <a href="login.html" class="btn btn-outline-light ms-2">Вхід</a>
                <a href="register.html" class="btn btn-outline-light ms-2">Реєстрація</a>
                <button class="btn btn-danger btn-sm">Видалити</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
  © 2026 URL Shortener App
</footer>

</body>
</html>
