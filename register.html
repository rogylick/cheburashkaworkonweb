<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Реєстрація</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
  <div class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">
    <h4>Реєстрація</h4>
    <form id="registrationForm">
      <div class="mb-3">
        <label class="form-label">Ім’я</label>
        <input id="name" type="text" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="reg-email" type="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Стать</label>
        <select id="gender" class="form-select">
          <option value="Чоловіча">Чоловіча</option>
          <option value="Жіноча">Жіноча</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Дата народження</label>
        <input id="birth" type="date" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input id="reg-password" type="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Зареєструватися</button>
    </form>
    <div class="mt-3 text-center">
      <a href="login.html">Вже є акаунт? Увійти</a>
    </div>
  </div>
</div>

<script src="model.js"></script>
<script src="controller.js"></script>

<script>
  // Додаємо обробник події безпосередньо тут для надійності
  document.getElementById('registrationForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (typeof Controller !== 'undefined') {
      Controller.register();
    } else {
      alert("Помилка: Файл controller.js не завантажено!");
    }
  });
</script>
</body>
</html>
