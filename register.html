<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">
  <div class="card p-4 shadow-sm">
    <h4>Реєстрація</h4>
    <form>
      <div class="mb-3">
        <label class="form-label">Ім’я</label>
        <input type="text" class="form-control" placeholder="Введіть ім’я">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="example@email.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Стать</label>
        <select class="form-select">
          <option>Чоловіча</option>
          <option>Жіноча</option>
          <option>Інше</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Дата народження</label>
        <input type="date" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" class="form-control">
      </div>

      <button class="btn btn-primary">Зареєструватися</button>
      <a href="login.html" class="btn btn-link">Вже є акаунт?</a>
    </form>
  </div>
</div>

</body>
</html>
