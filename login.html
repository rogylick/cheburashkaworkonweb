<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">🔗 URL Shortener</a>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">
  <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px;">
    <h4>Вхід</h4>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="login-email" type="email" class="form-control" placeholder="Email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input id="login-password" type="password" class="form-control" placeholder="Пароль" required>
      </div>

      <button type="submit" class="btn btn-success w-100">Увійти</button>
      <div class="mt-3 text-center">
        <a href="register.html" class="btn btn-link">Створити акаунт</a>
      </div>
    </form>
  </div>
</div>

<script src="model.js"></script>
<script src="controller.js"></script>
<script>
  // Надійний обробник події входу
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Зупиняємо перезавантаження сторінки
    if (typeof Controller !== 'undefined') {
      Controller.login();
    } else {
      alert("Помилка: Скрипти не завантажено. Перевірте папку 'js'!");
    }
  });
</script>

</body>
</html>
